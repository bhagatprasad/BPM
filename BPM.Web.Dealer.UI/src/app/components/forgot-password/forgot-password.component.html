<mat-card style="background-color: rgba(51, 170, 51, .1)">
  <mat-card-title>Forgot Password</mat-card-title>
  
  <mat-card-content>
    <form #forgetPasswordForm="ngForm" (ngSubmit)="onSubmit(forgetPasswordForm)">
     
      <p style="text-align: center; color: #666;">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      
      <p>
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input 
            type="email" 
            matInput 
            placeholder="Enter your email" 
            name="email"
            [(ngModel)]="email"
            #emailField="ngModel"
            required
            email
            autocomplete="off">
          
          <mat-error *ngIf="emailField.invalid && emailField.touched">
            <span *ngIf="emailField.errors?.['required']">Email is required</span>
            <span *ngIf="emailField.errors?.['email']">Please enter a valid email address</span>
          </mat-error>
        </mat-form-field>
      </p>

      <div class="button">
        <button 
          type="submit" 
          mat-raised-button 
          color="primary" 
          [disabled]="forgetPasswordForm.invalid || isSubmitting">
          {{ isSubmitting ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </div>

    </form>
  </mat-card-content>
</mat-card>
