<div class="container mt-4">
  <h2 class="mb-4">Shopping Cart</h2>

  <div *ngIf="cartItems.length > 0">
    <div class="cart-item shadow-sm mb-3" *ngFor="let item of cartItems">
      <!-- Product Image -->
      <div class="cart-image">
        <!-- Real Image -->
        <div *ngIf="item.imageUrl; else cartInitial" class="drug-image-wrapper">
          <img [src]="item.imageUrl" [alt]="item.drugName" />
        </div>

        <!-- Same Placeholder as Drug Catalog -->
        <ng-template #cartInitial>
          <span class="drug-icon">
            {{ item.drugName?.charAt(0) || 'D' }}
          </span>
        </ng-template>
      </div>

      <!-- Details -->
      <div class="cart-details">
        <h4>{{ item.drugName }}</h4>

        <p>
          <strong>Drug Code:</strong>
          {{ item.drugCode }}
        </p>

        <p>
          <strong>Manufacturer:</strong>
          {{ item.manufacturer }}
        </p>

        <p>
          <strong>Packing:</strong>
          {{ item.packing }}
        </p>

        <p>
          <strong>Strength:</strong>
          {{ item.strength }}
        </p>
      </div>

      <!-- Actions -->

      <div class="cart-actions">
        <div class="qty-box">
          <button class="btn btn-outline-secondary btn-sm" (click)="decrease(item.drugId)">
            -
          </button>

          <span>{{ item.quantity }}</span>

          <button class="btn btn-outline-primary btn-sm" (click)="increase(item.drugId)">+</button>
        </div>

        <button class="btn btn-outline-danger btn-sm mt-3" (click)="removeItem(item.drugId)">
          <i class="bi bi-trash"></i>

          Remove
        </button>
      </div>
    </div>

    <div class="cart-footer">
      <button class="btn btn-success btn-lg">
        <i class="bi bi-cart-check me-2"></i>

        Place Order
      </button>
    </div>
  </div>

  <div *ngIf="cartItems.length === 0" class="alert alert-info">Your cart is empty.</div>
</div>
