<div class="login-wrapper">
  <section class="auth-card">
    <!-- Brand/Logo Section -->
    <div class="auth-brand">
      <span class="brand-icon">
        <i class="bi bi-grid-1x2-fill" aria-hidden="true"></i>
      </span>
      <h3 class="fw-bold">adminHMD</h3>
      <small class="text-muted">Sign in to your admin workspace.</small>
    </div>
    
    <!-- Visual Image -->
    <div class="auth-visual">
      <img src="assets/images/png/dasher-ui-bootstrap-5.jpg" alt="adminHMD dashboard interface">
    </div>

    <!-- Login Form -->
    <form #loginForm="ngForm" (ngSubmit)="onLogin()" novalidate>
      <!-- Header -->
      <div class="form-header">
        <p class="eyebrow">Secure Access</p>
        <h1 class="h4">Login</h1>
        <p class="text-muted">Sign in to your admin workspace.</p>
      </div>

      <!-- Username field -->
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input 
          class="form-control" 
          id="username" 
          type="text" 
          placeholder="rahgu@gmail.com"
          required
          [(ngModel)]="loginObj.username" 
          name="username"
          #username="ngModel"
          [class.is-invalid]="username.invalid && username.touched">
        <div class="invalid-feedback" *ngIf="username.invalid && username.touched">
          Enter a valid username.
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label mb-0" for="loginPassword">Password</label>
          <a class="small fw-semibold text-primary text-decoration-none" href="forgot-password.html">Forgot?</a>
        </div>
        <input 
          class="form-control" 
          id="loginPassword" 
          type="password" 
          placeholder="Enter your password"
          minlength="6" 
          required
          [(ngModel)]="loginObj.password" 
          name="password"
          #password="ngModel"
          [class.is-invalid]="password.invalid && password.touched">
        <div class="invalid-feedback" *ngIf="password.invalid && password.touched">
          <span *ngIf="password.errors?.['required']">Password is required.</span>
          <span *ngIf="password.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <!-- Remember me checkbox -->
      <div class="form-check">
        <input 
          class="form-check-input" 
          type="checkbox" 
          id="rememberMe"
          [(ngModel)]="rememberMe" 
          name="rememberMe">
        <label class="form-check-label" for="rememberMe">Remember me</label>
      </div>

      <!-- Error message display -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        {{ errorMessage }}
      </div>

      <!-- Submit button -->
      <button 
        class="btn btn-primary" 
        type="submit"
        [disabled]="loginForm.invalid || isLoading">
        <i *ngIf="!isLoading" class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i>
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
          Signing in...
        </span>
      </button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <p class="text-center">
        New here? <a href="register.html">Create an account</a>
      </p>
    </div>
  </section>
</div>
