<section class="auth-card">
  <a class="auth-brand" href="index.html">
    <span class="brand-icon">
      <i class="bi bi-grid-1x2-fill" aria-hidden="true"></i>
    </span>
    <span>
      <strong>adminHMD</strong>
      <small>Sign in to your admin workspace.</small>
    </span>
  </a>
  
  <div class="auth-visual">
    <img src="assets/images/png/dasher-ui-bootstrap-5.jpg" alt="adminHMD dashboard interface">
  </div>

  <!-- Fixed form binding -->
  <form #loginForm="ngForm" (ngSubmit)="onLogin()" novalidate>
    <div class="mb-4">
      <p class="eyebrow mb-1">Secure Access</p>
      <h1 class="h3 mb-1">Login</h1>
      <p class="text-muted mb-0">Sign in to your admin workspace.</p>
    </div>

    <!-- Username field -->
    <div class="mb-3">
      <label class="form-label" for="username">Username</label>
      <input 
        class="form-control" 
        id="username" 
        type="text" 
        required
        [(ngModel)]="loginObj.username" 
        name="username"
        #username="ngModel"
        [class.is-invalid]="username.invalid && username.touched">
      <div class="invalid-feedback" *ngIf="username.invalid && username.touched">
        Enter a valid username.
      </div>
    </div>

    <!-- Password field -->
    <div class="mb-3">
      <div class="d-flex justify-content-between">
        <label class="form-label" for="loginPassword">Password</label>
        <a class="small fw-semibold" href="forgot-password.html">Forgot?</a>
      </div>
      <input 
        class="form-control" 
        id="loginPassword" 
        type="password" 
        minlength="6" 
        required
        [(ngModel)]="loginObj.password" 
        name="password"
        #password="ngModel"
        [class.is-invalid]="password.invalid && password.touched">
      <div class="invalid-feedback" *ngIf="password.invalid && password.touched">
        <span *ngIf="password.errors?.['required']">Password is required.</span>
        <span *ngIf="password.errors?.['minlength']">Password must be at least 6 characters.</span>
      </div>
    </div>

    <!-- Remember me checkbox -->
    <div class="form-check mb-4">
      <input 
        class="form-check-input" 
        type="checkbox" 
        id="rememberMe"
        [(ngModel)]="rememberMe" 
        name="rememberMe">
      <label class="form-check-label" for="rememberMe">Remember me</label>
    </div>

    <!-- Error message display (from component) -->
    <div *ngIf="errorMessage" class="alert alert-danger mb-3">
      {{ errorMessage }}
    </div>

    <!-- Submit button with loading state -->
    <button 
      class="btn btn-primary w-100" 
      type="submit"
      [disabled]="loginForm.invalid || isLoading">
      <i *ngIf="!isLoading" class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
      <span *ngIf="!isLoading">Sign In</span>
      <span *ngIf="isLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Signing in...
      </span>
    </button>
  </form>

  <div class="auth-footer">
    New here? <a href="register.html">Create an account</a>
  </div>
</section>
